spring.application.name=hotel-service-api

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/traver_ease_hotel_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update


eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/


spring.security.oauth2.resourceserver.jwt.token-uri=http://localhost:8080/realms/cpd-realm/protocol/openid-connect/token
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/hotel-management-realm
public.key.string=PUBLIC_KEY_STRING

keycloak.config.realm=hotel-management-realm
keycloak.config.server-url=http://localhost:8080/
keycloak.config.client-id=travel-ease-client
keycloak.config.grant-type=password
keycloak.config.name=thaminduweeravardana@gmail.com
keycloak.config.secret=KEY_CLOAK_SECRET
keycloak.config.password=1234


spring.data.redis.host=localhost
spring.data.redis.port=6379
hotel.room.hold-duration-minutes=15

accessKey=ACCESS_KEY
secret=SECRET
bucketName=cpd-3
region=us-east-1
